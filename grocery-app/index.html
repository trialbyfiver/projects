<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Grocery List" />
  <meta name="theme-color" content="#4caf50" />
  <title>Grocery List</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <header>
    <h1>🛒 Grocery List</h1>
    <button id="share-btn" aria-label="Share list">Share</button>
  </header>

  <!-- Add item form -->
  <section class="add-section">
    <form id="add-form" autocomplete="off">
      <input id="input-item"   type="text"   placeholder="Item *"   required />
      <input id="input-amount" type="text"   placeholder="Amount"  />
      <input id="input-store"  type="text"   placeholder="Store"   />
      <button type="submit">Add</button>
    </form>
  </section>

  <!-- Filters -->
  <section class="filter-section">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="notbought">Not Bought</button>
    <button class="filter-btn" data-filter="bought">Bought</button>
  </section>

  <!-- Grocery table -->
  <section class="table-section">
    <table>
      <thead>
        <tr>
          <th class="col-item">Item</th>
          <th class="col-amount">Amount</th>
          <th class="col-store">Store</th>
          <th class="col-check">✓</th>
          <th class="col-del"></th>
        </tr>
      </thead>
      <tbody id="item-tbody"></tbody>
    </table>
    <p id="empty-msg">No items yet. Add one above!</p>
  </section>

  <div id="toast"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
